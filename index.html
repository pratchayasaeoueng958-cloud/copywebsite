<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Number</title>

<link rel="icon" type="image/png" href="logo2.png?v=2">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎯 Lucky Number</h1>

<div class="left-panel">

    <h2>🔍 ตรวจเลข</h2>

    <p>วางเลข 2 หรือ 3 หลัก เพื่อตรวจเลขซ้ำและเลขกลับ</p>

    <textarea
        id="numberInput"
        rows="12"
        placeholder="วางเลขตรงนี้...
เช่น

11
22
33
11
12
21"></textarea>

    <div class="check-buttons">

        <button
class="check-btn"
onclick="checkNumbers()">

🔍 ตรวจเลข

</button>

        <button
class="clear-btn"
onclick="clearAll()">

🗑 ล้างข้อมูล

</button>

    </div>

    <div id="result">

        ผลการตรวจจะแสดงตรงนี้

    </div>

</div>

    <!-- ฝั่งขวา -->
    <div class="right-panel">

        <input
        type="text"
        id="search"
        placeholder="🔍 ค้นหาหัวข้อ..."
        onkeyup="searchCard()">

        <div id="cards" class="cards"></div>

    </div>

</div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
