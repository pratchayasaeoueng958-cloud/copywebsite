<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lucky Number</title>

<link rel="icon" href="logo2.png?v=3">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header>

        <h1>🎯 Lucky Number</h1>

    </header>


    <!-- Main -->

    <div class="main-container">


        <!-- =========================
             LEFT
        ========================== -->

        <section class="left-panel">

            <div class="checker-box">

                <h2>🔍 เครื่องมือตรวจเลข</h2>

                <p class="subtitle">
                    รองรับเลข 2 และ 3 หลัก
                    แยกด้วย เว้นวรรค . , / - หรือ Enter
                </p>

                <textarea
                    id="numberInput"
                    rows="13"
                    placeholder="ตัวอย่าง

11
22
33
11
12
21
121
211"></textarea>

                <div class="check-buttons">

                    <button
                        class="check-btn"
                        onclick="checkNumbers()">

                        🔍 ตรวจเลข

                    </button>

                    <button
                        class="clear-btn"
                        onclick="clearAll()">

                        🗑 ล้างข้อมูล

                    </button>

                </div>

                <div id="result">

                    <div class="empty">

                        📋 ผลการตรวจจะแสดงที่นี่

                    </div>

                </div>

            </div>

        </section>



        <!-- =========================
             RIGHT
        ========================== -->

        <aside class="right-panel">

            <input
                id="search"
                type="text"
                placeholder="🔍 ค้นหาหัวข้อ..."
                onkeyup="searchCard()">

            <div
                id="cards"
                class="cards">

            </div>

        </aside>


    </div>

</div>


<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
